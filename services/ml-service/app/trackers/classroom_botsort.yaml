# BoT-SORT for the static classroom camera.
#
# Philosophy after real-footage A/B runs: stock association values, because
# they produced the verified golden baseline, plus only the two changes that
# are provably safe for a bolted-down camera:
# - gmc_method none: the camera never moves; sparse optical flow costs
#   10-30 ms per frame and a walking teacher can bias the camera-motion
#   estimate, drifting every Kalman state.
# - model auto is required syntactically (BOTSORT.__init__ reads args.model
#   unconditionally) but inert while with_reid is false.
#
# Measured dead ends, kept out deliberately (see docs/ml-improvement-plan.md):
# - with_reid true + model auto: pose-head features ID-switched the walking
#   teacher into temporally overlapping identities; teacher classification
#   collapsed to zero.
# - fuse_score false + track_low 0.05 + new_track 0.40 + buffer 60: cut
#   stored detections 26% through under-association and fragmented the room
#   (23 identities, max_students 23). Revisit only with offline scenario
#   tooling, one knob at a time.
tracker_type: botsort
track_high_thresh: 0.25
track_low_thresh: 0.1
new_track_thresh: 0.25
track_buffer: 30
match_thresh: 0.8
fuse_score: true
gmc_method: none
proximity_thresh: 0.5
appearance_thresh: 0.25
with_reid: false
model: auto
