services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: classroom-db
    # Host port 5533 (not the default 5433) to avoid colliding with the
    # pinelodge stack. Matches DATABASE_URL in the .env files.
    ports:
      - "5533:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: classroom
    volumes:
      - classroom-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d classroom"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: classroom-redis
    command: ["redis-server", "--appendonly", "yes"]
    # Host port 6479 (not the default 6379) to avoid colliding with the
    # pinelodge stack. Matches REDIS_URL in the .env files.
    ports:
      - "6479:6379"
    volumes:
      - classroom-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  classroom-db-data:
  classroom-redis-data:
